services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_DB: spawnd
      POSTGRES_USER: spawnd
      POSTGRES_PASSWORD: spawnd
    ports:
      - "54329:5432"
    volumes:
      - spawnd-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spawnd -d spawnd"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: docker.io/library/redis:7
    ports:
      - "63799:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:0.138.0
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./deploy/container/otel-collector.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"

  minio:
    image: docker.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: spawnd
      MINIO_ROOT_PASSWORD: spawnd-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - spawnd-minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: docker.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 spawnd spawnd-secret &&
      mc mb --ignore-existing local/spawnd-artifacts
      "

  migrate:
    build:
      context: .
      dockerfile: Containerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPAWND_DATABASE_URL: postgresql+psycopg://spawnd:spawnd@postgres:5432/spawnd
    command: alembic upgrade head

  api:
    build:
      context: .
      dockerfile: Containerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      SPAWND_DATABASE_URL: postgresql+psycopg://spawnd:spawnd@postgres:5432/spawnd
      SPAWND_REDIS_URL: redis://redis:6379/0
      SPAWND_API_TOKEN: dev-token
      SPAWND_GITHUB_WEBHOOK_SECRET: dev-webhook-secret
      SPAWND_ARTIFACTS_BUCKET: spawnd-artifacts
      SPAWND_ARTIFACTS_ENDPOINT: http://minio:9000
      SPAWND_ARTIFACTS_REGION: us-east-1
      SPAWND_ARTIFACTS_PREFIX: dev
      AWS_ACCESS_KEY_ID: spawnd
      AWS_SECRET_ACCESS_KEY: spawnd-secret
    ports:
      - "8765:8765"
    command: spawnd serve --host 0.0.0.0 --port 8765

  worker:
    build:
      context: .
      dockerfile: Containerfile
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    environment:
      SPAWND_DATABASE_URL: postgresql+psycopg://spawnd:spawnd@postgres:5432/spawnd
      SPAWND_REDIS_URL: redis://redis:6379/0
      SPAWND_ARTIFACTS_BUCKET: spawnd-artifacts
      SPAWND_ARTIFACTS_ENDPOINT: http://minio:9000
      SPAWND_ARTIFACTS_REGION: us-east-1
      SPAWND_ARTIFACTS_PREFIX: dev
      SPAWND_SCRATCH_ROOT: /scratch
      SPAWND_RUNTIME_ISOLATION: container
      SPAWND_TELEMETRY_ENABLED: "1"
      SPAWND_TELEMETRY_EXPORTER: otlp
      SPAWND_TELEMETRY_CAPTURE: orchestrator
      SPAWND_TELEMETRY_FAILURE_POLICY: degrade
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      GIT_AUTHOR_NAME: spawnd
      GIT_AUTHOR_EMAIL: spawnd@example.invalid
      GIT_COMMITTER_NAME: spawnd
      GIT_COMMITTER_EMAIL: spawnd@example.invalid
      GIT_TERMINAL_PROMPT: "0"
      SPAWND_GIT_ASKPASS: /usr/local/bin/spawnd-git-askpass
      GIT_ASKPASS: /usr/local/bin/spawnd-git-askpass
      AWS_ACCESS_KEY_ID: spawnd
      AWS_SECRET_ACCESS_KEY: spawnd-secret
    volumes:
      - spawnd-scratch:/scratch
      - ${SPAWND_CODEX_AUTH_DIR:?SPAWND_CODEX_AUTH_DIR is required}:/root/.codex:ro
    command: spawnd worker --poll --worker-id compose-worker-1

  submitter:
    build:
      context: .
      dockerfile: Containerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      SPAWND_DATABASE_URL: postgresql+psycopg://spawnd:spawnd@postgres:5432/spawnd
      SPAWND_REDIS_URL: redis://redis:6379/0
    command: spawnd submit-queue drain --poll --consumer-id compose-submitter-1

  scheduler:
    build:
      context: .
      dockerfile: Containerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      SPAWND_DATABASE_URL: postgresql+psycopg://spawnd:spawnd@postgres:5432/spawnd
      SPAWND_REDIS_URL: redis://redis:6379/0
    command: spawnd schedules run-due --poll --idle-sleep-seconds 60

  outbox:
    build:
      context: .
      dockerfile: Containerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      SPAWND_DATABASE_URL: postgresql+psycopg://spawnd:spawnd@postgres:5432/spawnd
      SPAWND_REDIS_URL: redis://redis:6379/0
    command: spawnd drain-outbox --poll --idle-sleep-seconds 5

volumes:
  spawnd-postgres:
  spawnd-minio:
  spawnd-scratch:
